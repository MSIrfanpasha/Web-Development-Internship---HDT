<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABC Company</title>
    <style>
        .header{
            height: 100px;
            width: 100%;
            background-image: linear-gradient(to left,red,black);
            display: flex;
            border-radius: 20px;
        }
         .logo img{
            width: 70px;
            height: 70px;
            border-radius: 50%;
            margin: 10px 20px;
        }
        .nav{
            width: 70%;
            float: right;
            align-content: center;
            justify-content: center;
            margin-left: 30%;
        }
        .nav a{
            text-decoration: none;
            font-size: 24pt;
            color: white;
            padding: 5px 10px;
            font-family:'Trebuchet MS', 'Lucida Sans Unicode', 'Lucida Grande', 'Lucida Sans', Arial, sans-serif
        }
        .nav a:hover{
            color: orange;    
        }
        /*company*/
        .company{
            height: 50vh;
            width: 100%;
            background-color: gray;
            border-radius: 20px;
            margin-top: 10px;
        }
        .heading{
            width: 100%;
            height: 100%;
            background-image: linear-gradient(to right,rgba(255,0,0,0.2),rgba(0,0,0)),url('1.jpg');
            background-size:contain;
            border-radius: 20px;
            align-content: center;
            justify-items: center;
            animation: images 10s ease-in-out infinite;
            }
            @keyframes images{
                25%{
                    background-image:linear-gradient(to right,rgba(255,0,0,0.2),rgba(0,0,0)),url('2.jpg');
                }
                50%{
                    background-image:linear-gradient(to right,rgba(255,0,0,0.2),rgba(0,0,0)), url('3.jpg');
                }
                75%{
                    background-image:linear-gradient(to right,rgba(255,0,0,0.2),rgba(0,0,0)), url('5.jpg');
                }
                100%{
                    background-image:linear-gradient(to right,rgba(255,0,0,0.2),rgba(0,0,0)), url(4.jpg);
                }
            }
            .heading h1{
                font-size: 60px;
                color: whitesmoke;
                text-shadow: 2px 2px black;
                animation: colors 2s infinite;
            }
            @keyframes colors{
                25%{
                    color:whitesmoke;
                }
                50%{
                    color:greenyellow;
                     }
                     75%{
                        color:orange;
                     }
                     100%{
                        color:whitesmoke;
                     }
            }
            .heading h3{
                color: whitesmoke;
                text-shadow: 2px 2px black;
            }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">
            <img src="logo.jpg" alt="">
        </div>
        <div class="nav">
            <nav>
                <a href="#home">Home</a>
                <a href="#about">About</a>
                <a href="#contact">Contact</a>
                <a href="#login">Login</a>
                <a href="Signup">SignUp</a>
            </nav>
        </div>
    </header>
    <section class="company">
        <div class="heading">
            <h1>ABC Company</h1>
            <h3>Chikkballapura</h3>
        </div>
    </section>
</body>
</html>
