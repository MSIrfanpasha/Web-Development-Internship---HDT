<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Porsche Company</title>
    <style>
        .header{
            height: 100px;
            width: 100%;
            background-color: black;
            background-image: linear-gradient(to left brown, grey);
            display: flex;
            
        }

        
        .logo img{
            width: 80px;
            height: 70px;
            border-radius: 50%;
            margin: 10px 20px;
        }

        .nav{
            width: 70%;
            float: right;
            align-content: center;
            justify-content: center;
            margin-left: 30%;
        }

        .nav a{
            text-decoration: none;
            font-size: 24pt;
            color: white;
            padding: 5px 10px;
            font-family: 'Times New Roman', Times, serif;
        }

        .nav a:hover{
            color: orange;
            border-bottom: 2px solid greenyellow;
            border-bottom-right-radius: 10px;
            border-bottom-left-radius: 10px;
        }

        .company{
            height: 60vh;
            width: 100%;
            background-color: antiquewhite;
            border-radius: 10px;
            margin-top: 10px;
        }

        .heading{
                width: 100%;
                height: 100%;
                background-image:url('porsche_centre_delhi_ncr_cover.jpg');
                background-size:contain;
                border-radius: 20px;
                align-content: center;
                justify-items: center;
                animation: images 5s infinite;
            }

@keyframes images{
    35%{
        background-image:url('imag1head.jpg');
    }
    50%{
        background-image: url('image2.jpg');
    }
    75%{
        background-image:url('image4.avif');
    }
    100%{
        background-image:url('image5.jpg');
    }
        }

        .heading h1{
            font-size: 60px;
            color: whitesmoke;
            text-shadow: 2px 2px black;
            animation: color 3s infinite;
        }
         @keyframes color{
                25%{
                    color:whitesmoke;
                }
                50%{
                    color:greenyellow;
                     }
                     75%{
                        color:orange;
                     }
                     100%{
                        color:red;
                     }
                    }
          .heading h3{
                color: orangered;
                text-shadow: 2px 2px black;
            }
    </style>
</head>
<body>
    <header class="header">

        <div class="logo">
            <img src="download.png" alt="" >
        </div>

        <div class="nav">
            <nav>
                <a href="#home">Home</a>
                <a href="#about">About</a>
                  <a href="#Contact">Contact</a>
                    <a href="#login">login</a>
                      <a href="#Signup">Singup</a>
            </nav>
        </div>
    </header>
    <section class="company">
        <div class="heading">
            <h1>Porsche Auto Company</h1>
            <h3>New york</h3>
        </div>
    </section>
   
</body>
</html>
